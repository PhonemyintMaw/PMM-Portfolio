<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Phone Myint Maw</title>
    <link
        href="https://fonts.googleapis.com/css2?family=Lato:ital,wght@0,100;0,300;0,400;0,700;0,900;1,100;1,300;1,400;1,700;1,900&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="email.css">
</head>

<body>

    <section class="email-page-main">
        <a href="http://phonemyintmaw.dev">
            <button class="back-btn">
                Back
            </button>
        </a>
        <div class="head">
            <h1>Email Me</h1>
        </div>
        <div class="email-section">

            <div class="left-side">


                <img src="images/paperplane.png" alt="paperplane">


            </div>
            <div class="boundary">
                |
            </div>
            <form class="email-section-body-msg" action="send_email.php" method="POST">
                <div class="msg-part">
                    <div class="msg-sections">
                        <label for="name">Name:</label>
                        <input type="text" name="name" id="name" placeholder="Your Name" required>
                    </div>
                    <div class="msg-sections">
                        <label for="email">Email:</label>
                        <input name="email" id="email" type="email" placeholder="example@email.com" required>
                    </div>
                    <div class="msg-sections">
                        <label for="subject">Subject:</label>
                        <input type="text" id="subject" name="subject" placeholder="Subject" required>
                    </div>
                    <div class="msg-sections-message">
                        <label for="content">Message:</label>
                        <textarea name="message" id="message" type="text" rows="10" placeholder="Write Message"
                            required></textarea>
                    </div>
                </div>
                <div class="btn-part">
                    <button type="submit">Send</button>
                </div>

            </form>

        </div>

    </section>
</body>

</html>
